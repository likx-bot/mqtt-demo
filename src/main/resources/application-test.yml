# Spring Boot 应用名称
spring:
  datasource:
    url: jdbc:mysql://localhost:9393/dataSource?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  kafka:
    # Kafka 服务器地址，多个用逗号分隔
    # 格式: host:port
    bootstrap-servers: 127.0.0.1:9092

    # 生产者配置（发送消息）
    producer:
      # 消息 key 的序列化方式，String 类型用 StringSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 消息 value 的序列化方式，String 类型用 StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    # 消费者配置（接收消息）
    consumer:
      # 消费者组 ID，同一组内的消费者共同消费 topic
      # 一条消息只会被同一组内的一个消费者消费
      group-id: mqtt-consumer-group
      # 消息 key 的反序列化方式
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 消息 value 的反序列化方式
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 偏移量重置策略：当没有初始偏移量或当前偏移量不存在时
      # earliest: 从最早的消息开始读取
      # latest: 从最新的消息开始读取（默认）
      # none: 没有偏移量时抛异常
      auto-offset-reset: earliest
      # 关闭配置打印
      log.connection.close: false

# 服务器端口
server:
  port: 8080

# MQTT 配置
mqtt:
  broker-url: tcp://localhost:1884
  topic: sensor/device_01
  username: ""      # EMQX 用户名，没有则留空
  password: ""      # EMQX 密码，没有则留空

# 日志配置
logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# InfluxDB 配置
influx:
  url: http://localhost:8086
  token: my_super_token
  org: my_org
  bucket: sensor_data

# knife4j 配置
knife4j:
  enable: true
  openapi:
    title: "API文档"
    description: "接口文档"
    version: "1.0.0"

