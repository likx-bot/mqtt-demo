# Spring Boot 应用名称
spring:
  application:
    name: mqtt-springboot
  profiles:
    active: dev
# 日志配置
logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# knife4j 配置
knife4j:
  enable: true
  openapi:
    title: "API文档"
    description: "接口文档"
    version: "1.0.0"

